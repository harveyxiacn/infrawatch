spring:
  datasource:
    url: jdbc:h2:mem:infrawatch
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false

logging:
  level:
    com.infrawatch: DEBUG
    org.springframework.security: DEBUG
