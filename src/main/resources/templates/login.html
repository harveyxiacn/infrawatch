<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfraWatch — Sign In</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/infrawatch.css}">
    <style>
        body {
            background: var(--background);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(59,130,246,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(34,197,94,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(6,182,212,0.04) 0%, transparent 50%);
            animation: drift 20s ease-in-out infinite alternate;
        }
        @keyframes drift {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-2%, -1%) rotate(1deg); }
        }
        .login-card {
            position: relative;
            z-index: 1;
            background: var(--card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--card-radius);
            box-shadow: 0 24px 80px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
            overflow: hidden;
            animation: fadeUp 0.5s var(--ease);
        }
        .login-top {
            padding: 2.5rem 2rem 1.5rem;
            text-align: center;
        }
        .login-top .brand-mark {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }
        .login-top .brand-mark .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--status-ok);
            box-shadow: 0 0 12px var(--status-ok);
        }
        .login-top h2 {
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: 3px;
            color: #fff;
            margin: 0;
        }
        .login-top p {
            color: var(--muted-foreground);
            font-size: 0.8rem;
            margin: 0.5rem 0 0;
            letter-spacing: 1px;
        }
        .login-body {
            padding: 0 2rem 2.5rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-top">
            <div class="brand-mark">
                <span class="dot"></span>
                <h2>INFRAWATCH</h2>
            </div>
            <p>Infrastructure Monitoring Platform</p>
        </div>
        <div class="login-body">
            <div th:if="${param.error}" class="alert alert-danger mb-3" role="alert">
                Invalid username or password.
            </div>
            <div th:if="${param.logout}" class="alert alert-info mb-3" role="alert">
                You have been signed out.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username"
                           placeholder="Enter username" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100" style="margin-top: 0.5rem;">Sign In</button>
            </form>
        </div>
    </div>
</body>
</html>
