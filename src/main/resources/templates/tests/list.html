<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Test Cases — InfraWatch</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/infrawatch.css}">
    <link rel="stylesheet" th:href="@{/css/themes.css}">
    <script th:src="@{/js/theme-switcher.js}" defer></script>
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <div class="top-bar">
            <span class="page-title">Test Cases</span>
            <div class="user-info">
                <span class="user-name" sec:authentication="name">user</span>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn-logout">Sign Out</button>
                </form>
            </div>
        </div>
        <div class="page-container">
            <div class="page-header">
                <h2>Test Cases</h2>
            </div>
            <div class="card">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Enabled</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="tc : ${testCases}">
                                <td><a th:href="@{/tests/{id}(id=${tc.id})}" th:text="${tc.name}"></a></td>
                                <td><span class="badge bg-info" th:text="${tc.category}"></span></td>
                                <td>
                                    <span th:if="${tc.enabled}" class="badge bg-success">Yes</span>
                                    <span th:unless="${tc.enabled}" class="badge bg-secondary">No</span>
                                </td>
                                <td>
                                    <a th:href="@{/tests/{id}(id=${tc.id})}" class="btn btn-sm btn-outline-primary">View</a>
                                </td>
                            </tr>
                            <tr th:if="${testCases.isEmpty()}">
                                <td colspan="4" class="text-center text-muted py-4">No test cases found.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
