<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Test Cases</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/infrawatch.css}">
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="flex-grow-1" style="margin-left: 250px; min-height: 100vh;">
        <div class="container-fluid p-4">
            <h2 class="mb-4">Test Cases</h2>
            <div class="card">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Enabled</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="tc : ${testCases}">
                                <td><a th:href="@{/tests/{id}(id=${tc.id})}" th:text="${tc.name}"></a></td>
                                <td><span class="badge bg-info" th:text="${tc.category}"></span></td>
                                <td>
                                    <span th:if="${tc.enabled}" class="badge bg-success">Yes</span>
                                    <span th:unless="${tc.enabled}" class="badge bg-secondary">No</span>
                                </td>
                                <td>
                                    <a th:href="@{/tests/{id}(id=${tc.id})}" class="btn btn-sm btn-outline-primary">View</a>
                                </td>
                            </tr>
                            <tr th:if="${testCases.isEmpty()}">
                                <td colspan="4" class="text-center text-muted py-4">No test cases found.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
