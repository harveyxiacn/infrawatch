<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Server Form — InfraWatch</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/infrawatch.css}">
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <div class="top-bar">
            <span class="page-title" th:text="${server.id != null ? 'Edit Server' : 'Add Server'}">Server Form</span>
            <div class="user-info">
                <span class="user-name" sec:authentication="name">user</span>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn-logout">Sign Out</button>
                </form>
            </div>
        </div>
        <div class="page-container">
            <div class="page-header">
                <h2 th:text="${server.id != null ? 'Edit Server' : 'Add Server'}">Server Form</h2>
            </div>

            <div class="card mt-4">
                <div class="card-body">
                    <form th:action="${server.id != null ? '/servers/' + server.id + '/edit' : '/servers/new'}"
                          method="post" id="serverForm">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="hostname" class="form-label">Hostname *</label>
                                <input type="text" class="form-control" id="hostname" name="hostname"
                                       th:value="${server.hostname}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="ipAddress" class="form-label">IP Address *</label>
                                <input type="text" class="form-control" id="ipAddress" name="ipAddress"
                                       th:value="${server.ipAddress}" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="os" class="form-label">Operating System</label>
                                <input type="text" class="form-control" id="os" name="os"
                                       th:value="${server.os}">
                            </div>
                            <div class="col-md-2 mb-3">
                                <label for="cpuCores" class="form-label">CPU Cores</label>
                                <input type="number" class="form-control" id="cpuCores" name="cpuCores"
                                       th:value="${server.cpuCores}" min="1">
                            </div>
                            <div class="col-md-2 mb-3">
                                <label for="ramGb" class="form-label">RAM (GB)</label>
                                <input type="number" class="form-control" id="ramGb" name="ramGb"
                                       th:value="${server.ramGb}" min="1">
                            </div>
                            <div class="col-md-2 mb-3">
                                <label for="diskGb" class="form-label">Disk (GB)</label>
                                <input type="number" class="form-control" id="diskGb" name="diskGb"
                                       th:value="${server.diskGb}" min="1">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="location" class="form-label">Location</label>
                                <input type="text" class="form-control" id="location" name="location"
                                       th:value="${server.location}" placeholder="e.g. DC1-Rack-A3-U12">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="status" class="form-label">Status</label>
                                <select class="form-select" id="status" name="status">
                                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"
                                            th:selected="${s == server.status}"></option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="environment" class="form-label">Environment</label>
                                <select class="form-select" id="environment" name="environment">
                                    <option th:each="e : ${environments}" th:value="${e}" th:text="${e}"
                                            th:selected="${e == server.environment}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description"
                                      rows="3" th:text="${server.description}"></textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Save</button>
                            <a th:href="@{/servers}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
