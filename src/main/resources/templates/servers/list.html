<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Servers — InfraWatch</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/infrawatch.css}">
    <link rel="stylesheet" th:href="@{/css/themes.css}">
    <script th:src="@{/js/theme-switcher.js}" defer></script>
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <div class="top-bar">
            <span class="page-title">Servers</span>
            <div class="user-info">
                <span class="user-name" sec:authentication="name">user</span>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn-logout">Sign Out</button>
                </form>
            </div>
        </div>

        <div class="page-container">
            <div class="page-header">
                <h2>Server Inventory</h2>
                <a th:href="@{/servers/new}" class="btn btn-primary">+ Add Server</a>
            </div>

            <div th:if="${message}" class="alert alert-info alert-dismissible fade show mb-3" role="alert" style="background: var(--status-info-soft); border: 1px solid rgba(59,130,246,0.2); color: var(--status-info);">
                <span th:text="${message}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Filters -->
            <div class="card mb-4">
                <div class="card-body" style="padding: 1rem 1.25rem !important;">
                    <form th:action="@{/servers}" method="get" class="row g-2 align-items-end">
                        <div class="col-md-4">
                            <input type="text" name="search" class="form-control"
                                   placeholder="Search hostname..." th:value="${search}">
                        </div>
                        <div class="col-md-3">
                            <select name="status" class="form-select">
                                <option value="">All Statuses</option>
                                <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"
                                        th:selected="${s == currentStatus}"></option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <select name="environment" class="form-select">
                                <option value="">All Environments</option>
                                <option th:each="e : ${environments}" th:value="${e}" th:text="${e}"
                                        th:selected="${e == currentEnvironment}"></option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-secondary w-100">Filter</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Server Table -->
            <div class="card">
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Hostname</th>
                                <th>IP Address</th>
                                <th>OS</th>
                                <th>CPU</th>
                                <th>RAM</th>
                                <th>Status</th>
                                <th>Environment</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="server : ${servers}">
                                <td>
                                    <a th:href="@{/servers/{id}(id=${server.id})}"
                                       th:text="${server.hostname}" class="mono"></a>
                                </td>
                                <td class="mono" th:text="${server.ipAddress}"></td>
                                <td th:text="${server.os}"></td>
                                <td class="mono" th:text="${server.cpuCores}"></td>
                                <td class="mono" th:text="${server.ramGb + ' GB'}"></td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${server.status.name() == 'ONLINE' ? 'bg-success' : (server.status.name() == 'OFFLINE' ? 'bg-danger' : 'bg-warning')}"
                                          th:text="${server.status}"></span>
                                </td>
                                <td>
                                    <span class="badge bg-info" th:text="${server.environment}"></span>
                                </td>
                                <td>
                                    <a th:href="@{/servers/{id}/edit(id=${server.id})}"
                                       class="btn btn-sm btn-outline-primary">Edit</a>
                                </td>
                            </tr>
                            <tr th:if="${servers.isEmpty()}">
                                <td colspan="8" class="text-center py-4" style="color: var(--muted-foreground);">No servers found.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="card-footer" th:if="${servers.totalPages > 1}">
                    <nav>
                        <ul class="pagination mb-0 justify-content-center">
                            <li class="page-item" th:classappend="${servers.first ? 'disabled' : ''}">
                                <a class="page-link" th:href="@{/servers(page=${servers.number - 1})}">Prev</a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, servers.totalPages - 1)}"
                                th:classappend="${i == servers.number ? 'active' : ''}">
                                <a class="page-link" th:href="@{/servers(page=${i})}" th:text="${i + 1}"></a>
                            </li>
                            <li class="page-item" th:classappend="${servers.last ? 'disabled' : ''}">
                                <a class="page-link" th:href="@{/servers(page=${servers.number + 1})}">Next</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
