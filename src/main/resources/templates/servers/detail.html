<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title th:text="'Server: ' + ${server.hostname} + ' — InfraWatch'">Server Detail</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/infrawatch.css}">
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <div class="top-bar">
            <span class="page-title">Server Detail</span>
            <div class="user-info">
                <span class="user-name" sec:authentication="name">user</span>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn-logout">Sign Out</button>
                </form>
            </div>
        </div>

        <div class="page-container">
            <div class="page-header">
                <div>
                    <h2 th:text="${server.hostname}" class="mono" style="font-family: var(--font-mono);"></h2>
                    <div style="margin-top: 0.25rem;">
                        <span class="badge"
                              th:classappend="${server.status.name() == 'ONLINE' ? 'bg-success' : (server.status.name() == 'OFFLINE' ? 'bg-danger' : 'bg-warning')}"
                              th:text="${server.status}"></span>
                        <span class="badge bg-info" th:text="${server.environment}" style="margin-left: 0.25rem;"></span>
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <a th:href="@{/servers/{id}/edit(id=${server.id})}" class="btn btn-primary">Edit</a>
                    <form th:action="@{/servers/{id}/delete(id=${server.id})}" method="post" class="d-inline" onsubmit="return confirm('Delete this server?');">
                        <button type="submit" class="btn btn-outline-danger">Delete</button>
                    </form>
                    <a th:href="@{/servers}" class="btn btn-outline-secondary">Back</a>
                </div>
            </div>

            <!-- Health Metric Gauges -->
            <div class="row g-3 mb-4" th:if="${latestMetric != null}">
                <div class="col-md-3">
                    <div class="card">
                        <div class="card-body metric-gauge" th:classappend="${latestMetric.cpuPercent > 90 ? 'crit' : (latestMetric.cpuPercent > 70 ? 'warn' : 'ok')}">
                            <div class="gauge-value" th:text="${#numbers.formatDecimal(latestMetric.cpuPercent, 1, 1) + '%'}">0%</div>
                            <div class="gauge-label">CPU Usage</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card">
                        <div class="card-body metric-gauge" th:classappend="${latestMetric.memPercent > 90 ? 'crit' : (latestMetric.memPercent > 70 ? 'warn' : 'ok')}">
                            <div class="gauge-value" th:text="${#numbers.formatDecimal(latestMetric.memPercent, 1, 1) + '%'}">0%</div>
                            <div class="gauge-label">Memory</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card">
                        <div class="card-body metric-gauge" th:classappend="${latestMetric.diskPercent > 85 ? 'crit' : (latestMetric.diskPercent > 70 ? 'warn' : 'ok')}">
                            <div class="gauge-value" th:text="${#numbers.formatDecimal(latestMetric.diskPercent, 1, 1) + '%'}">0%</div>
                            <div class="gauge-label">Disk</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card">
                        <div class="card-body metric-gauge ok">
                            <div class="gauge-value" th:text="${latestMetric.uptimeSeconds != null ? (latestMetric.uptimeSeconds / 86400) + 'd' : 'N/A'}">N/A</div>
                            <div class="gauge-label">Uptime</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-3 mb-4">
                <!-- Server Info -->
                <div class="col-md-6">
                    <div class="card h-100">
                        <div class="card-header"><h5>Server Information</h5></div>
                        <div class="card-body">
                            <table class="table" style="margin: 0;">
                                <tr><td class="text-muted" style="width: 40%; border-top: none !important;">Hostname</td><td class="mono" style="border-top: none !important;" th:text="${server.hostname}"></td></tr>
                                <tr><td class="text-muted">IP Address</td><td class="mono" th:text="${server.ipAddress}"></td></tr>
                                <tr><td class="text-muted">OS</td><td th:text="${server.os}"></td></tr>
                                <tr><td class="text-muted">Location</td><td class="mono" th:text="${server.location}"></td></tr>
                            </table>
                        </div>
                    </div>
                </div>
                <!-- Hardware -->
                <div class="col-md-6">
                    <div class="card h-100">
                        <div class="card-header"><h5>Hardware Specs</h5></div>
                        <div class="card-body">
                            <table class="table" style="margin: 0;">
                                <tr><td class="text-muted" style="width: 40%; border-top: none !important;">CPU Cores</td><td class="mono" style="border-top: none !important;" th:text="${server.cpuCores}"></td></tr>
                                <tr><td class="text-muted">RAM</td><td class="mono" th:text="${server.ramGb + ' GB'}"></td></tr>
                                <tr><td class="text-muted">Disk</td><td class="mono" th:text="${server.diskGb + ' GB'}"></td></tr>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Health Chart -->
            <div class="card">
                <div class="card-header"><h5>Health Metrics &mdash; 7 Days</h5></div>
                <div class="card-body" style="height: 300px;">
                    <canvas id="metricsChart"></canvas>
                </div>
            </div>
        </div>
    </main>
</div>

<script th:src="@{/webjars/chart.js/4.4.2/dist/chart.umd.js}"></script>
<script th:inline="javascript">
    const metrics = [[${metrics}]];

    Chart.defaults.color = '#8b8fa3';
    Chart.defaults.borderColor = 'rgba(255,255,255,0.06)';

    if (metrics && metrics.length > 0) {
        const labels = metrics.map(m => {
            const d = new Date(m.timestamp);
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' + d.getHours() + ':00';
        });
        new Chart(document.getElementById('metricsChart'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'CPU %', data: metrics.map(m => m.cpuPercent),
                        borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.08)',
                        fill: true, tension: 0.3, borderWidth: 2, pointRadius: 0, pointHoverRadius: 4
                    },
                    {
                        label: 'Memory %', data: metrics.map(m => m.memPercent),
                        borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.08)',
                        fill: true, tension: 0.3, borderWidth: 2, pointRadius: 0, pointHoverRadius: 4
                    },
                    {
                        label: 'Disk %', data: metrics.map(m => m.diskPercent),
                        borderColor: '#f59e0b', backgroundColor: 'rgba(245,158,11,0.05)',
                        fill: true, tension: 0.3, borderWidth: 2, pointRadius: 0, pointHoverRadius: 4
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { intersect: false, mode: 'index' },
                scales: {
                    y: { min: 0, max: 100, ticks: { callback: v => v + '%', font: { family: "'JetBrains Mono'", size: 10 } }, grid: { color: 'rgba(255,255,255,0.04)' } },
                    x: { ticks: { maxTicksLimit: 12, font: { size: 10 } }, grid: { display: false } }
                },
                plugins: {
                    legend: { labels: { usePointStyle: true, pointStyleWidth: 8, font: { family: "'DM Sans'", size: 12 } } },
                    tooltip: { backgroundColor: '#1c2030', titleFont: { family: "'DM Sans'" }, bodyFont: { family: "'JetBrains Mono'", size: 12 }, padding: 12, cornerRadius: 8 }
                }
            }
        });
    }
</script>
</body>
</html>
