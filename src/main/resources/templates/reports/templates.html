<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Report Templates</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/infrawatch.css}">
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="flex-grow-1" style="margin-left: 250px; min-height: 100vh;">
        <div class="container-fluid p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Report Templates</h2>
                <a th:href="@{/reports/archives}" class="btn btn-outline-secondary">View Archives</a>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3" th:each="template : ${templates}">
                    <div class="card h-100">
                        <div class="card-body">
                            <h5 class="card-title" th:text="${template.name}">Template</h5>
                            <p class="card-text text-muted" th:text="${template.description}">Description</p>
                            <span class="badge bg-primary" th:text="${template.type}">Type</span>
                        </div>
                        <div class="card-footer">
                            <button class="btn btn-sm btn-primary">Generate PDF</button>
                            <button class="btn btn-sm btn-success">Generate Excel</button>
                        </div>
                    </div>
                </div>
                <div th:if="${#lists.isEmpty(templates)}" class="col-12 text-center text-muted py-4">
                    No report templates configured yet.
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
