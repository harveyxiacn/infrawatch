<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Report Templates — InfraWatch</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/infrawatch.css}">
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <div class="top-bar">
            <span class="page-title">Report Templates</span>
            <div class="user-info">
                <span class="user-name" sec:authentication="name">user</span>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn-logout">Sign Out</button>
                </form>
            </div>
        </div>
        <div class="page-container">
            <div class="page-header">
                <h2>Report Templates</h2>
                <a th:href="@{/reports/archives}" class="btn btn-outline-secondary">View Archives</a>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3" th:each="template : ${templates}">
                    <div class="card h-100">
                        <div class="card-body">
                            <h5 class="card-title" th:text="${template.name}">Template</h5>
                            <p class="card-text text-muted" th:text="${template.description}">Description</p>
                            <span class="badge bg-primary" th:text="${template.type}">Type</span>
                        </div>
                        <div class="card-footer d-flex gap-2">
                            <form th:action="@{/reports/generate}" method="post" class="d-inline">
                                <input type="hidden" name="templateId" th:value="${template.id}">
                                <input type="hidden" name="format" value="PDF">
                                <button type="submit" class="btn btn-sm btn-primary">Generate PDF</button>
                            </form>
                            <form th:action="@{/reports/generate}" method="post" class="d-inline">
                                <input type="hidden" name="templateId" th:value="${template.id}">
                                <input type="hidden" name="format" value="EXCEL">
                                <button type="submit" class="btn btn-sm btn-success">Generate Excel</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div th:if="${#lists.isEmpty(templates)}" class="col-12 text-center text-muted py-4">
                    No report templates configured yet.
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
