<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Report Archives — InfraWatch</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/infrawatch.css}">
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <div class="top-bar">
            <span class="page-title">Report Archives</span>
            <div class="user-info">
                <span class="user-name" sec:authentication="name">user</span>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn-logout">Sign Out</button>
                </form>
            </div>
        </div>
        <div class="page-container">
            <div class="page-header">
                <h2>Report Archives</h2>
                <a th:href="@{/reports}" class="btn btn-outline-secondary">Back to Templates</a>
            </div>
            <div th:if="${message}" class="alert alert-info alert-dismissible fade show mb-3" role="alert" style="background: var(--iw-blue-soft); border: 1px solid rgba(59,130,246,0.2); color: var(--iw-blue);">
                <span th:text="${message}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>Report Name</th>
                                <th>Format</th>
                                <th>Size</th>
                                <th>Generated At</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="archive : ${archives}">
                                <td th:text="${archive.reportName}"></td>
                                <td><span class="badge bg-secondary" th:text="${archive.format}"></span></td>
                                <td th:text="${archive.fileSizeBytes != null ? (archive.fileSizeBytes / 1024) + ' KB' : 'N/A'}"></td>
                                <td th:text="${#temporals.format(archive.generatedAt, 'yyyy-MM-dd HH:mm')}"></td>
                                <td><a th:href="@{/reports/archives/{id}/download(id=${archive.id})}" class="btn btn-sm btn-outline-primary">Download</a></td>
                            </tr>
                            <tr th:if="${archives.isEmpty()}">
                                <td colspan="5" class="text-center text-muted py-4">No reports generated yet.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
