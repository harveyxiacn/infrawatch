<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Report Archives</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/infrawatch.css}">
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="flex-grow-1" style="margin-left: 250px; min-height: 100vh;">
        <div class="container-fluid p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Report Archives</h2>
                <a th:href="@{/reports}" class="btn btn-outline-secondary">Back to Templates</a>
            </div>
            <div class="card">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Report Name</th>
                                <th>Format</th>
                                <th>Size</th>
                                <th>Generated At</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="archive : ${archives}">
                                <td th:text="${archive.reportName}"></td>
                                <td><span class="badge bg-secondary" th:text="${archive.format}"></span></td>
                                <td th:text="${archive.fileSizeBytes != null ? (archive.fileSizeBytes / 1024) + ' KB' : 'N/A'}"></td>
                                <td th:text="${#temporals.format(archive.generatedAt, 'yyyy-MM-dd HH:mm')}"></td>
                                <td><a href="#" class="btn btn-sm btn-outline-primary">Download</a></td>
                            </tr>
                            <tr th:if="${archives.isEmpty()}">
                                <td colspan="5" class="text-center text-muted py-4">No reports generated yet.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
