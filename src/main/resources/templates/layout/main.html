<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null ? pageTitle + ' — InfraWatch' : 'InfraWatch'}">InfraWatch</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/infrawatch.css}">
    <link rel="stylesheet" th:href="@{/css/themes.css}">
    <script th:src="@{/js/theme-switcher.js}" defer></script>
</head>
<body>
    <div class="d-flex">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <main class="main-content">
            <div class="top-bar">
                <span class="page-title" th:text="${pageTitle}">InfraWatch</span>
                <div class="user-info">
                    <span class="user-name" sec:authentication="name">User</span>
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn-logout">Sign Out</button>
                    </form>
                </div>
            </div>

            <div class="page-container">
                <div th:fragment="content"></div>
            </div>
        </main>
    </div>

    <script th:src="@{/webjars/htmx.org/1.9.12/dist/htmx.min.js}"></script>
    <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/webjars/chart.js/4.4.2/dist/chart.umd.js}"></script>
    <th:block th:fragment="scripts"></th:block>
</body>
</html>
