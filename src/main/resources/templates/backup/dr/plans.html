<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>DR Plans — InfraWatch</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/infrawatch.css}">
    <link rel="stylesheet" th:href="@{/css/themes.css}">
    <script th:src="@{/js/theme-switcher.js}" defer></script>
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <div class="top-bar">
            <span class="page-title">DR Plans</span>
            <div class="user-info">
                <span class="user-name" sec:authentication="name">user</span>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn-logout">Sign Out</button>
                </form>
            </div>
        </div>
        <div class="page-container">
            <div class="page-header">
                <h2>Disaster Recovery Plans</h2>
            </div>

            <div class="card">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>System Name</th>
                                <th>RTO (min)</th>
                                <th>RPO (min)</th>
                                <th>Responsible Team</th>
                                <th>Contact Email</th>
                                <th>Version</th>
                                <th>Last Review</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="plan : ${plans}">
                                <td><a th:href="@{/backup/dr/plans/{id}(id=${plan.id})}" th:text="${plan.systemName}"></a></td>
                                <td class="mono" th:text="${plan.rtoMinutes}"></td>
                                <td class="mono" th:text="${plan.rpoMinutes}"></td>
                                <td th:text="${plan.responsibleTeam}"></td>
                                <td th:text="${plan.contactEmail}"></td>
                                <td><span class="badge bg-info" th:text="'v' + ${plan.version}"></span></td>
                                <td th:text="${plan.lastReviewDate}"></td>
                                <td>
                                    <a th:href="@{/backup/dr/plans/{id}/drills(id=${plan.id})}"
                                       class="btn btn-sm btn-outline-primary">Drills</a>
                                </td>
                            </tr>
                            <tr th:if="${plans.isEmpty()}">
                                <td colspan="8" class="text-center text-muted py-4">No DR plans found.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="card-footer" th:if="${plans.totalPages > 1}">
                    <nav>
                        <ul class="pagination mb-0 justify-content-center">
                            <li class="page-item" th:classappend="${plans.first ? 'disabled' : ''}">
                                <a class="page-link" th:href="@{/backup/dr/plans(page=${plans.number - 1})}">Previous</a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, plans.totalPages - 1)}"
                                th:classappend="${i == plans.number ? 'active' : ''}">
                                <a class="page-link" th:href="@{/backup/dr/plans(page=${i})}" th:text="${i + 1}"></a>
                            </li>
                            <li class="page-item" th:classappend="${plans.last ? 'disabled' : ''}">
                                <a class="page-link" th:href="@{/backup/dr/plans(page=${plans.number + 1})}">Next</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
