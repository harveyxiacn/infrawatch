<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Backup Trend — InfraWatch</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/infrawatch.css}">
    <link rel="stylesheet" th:href="@{/css/themes.css}">
    <script th:src="@{/js/theme-switcher.js}" defer></script>
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <div class="top-bar">
            <span class="page-title">Backup Trend</span>
            <div class="user-info">
                <span class="user-name" sec:authentication="name">user</span>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn-logout">Sign Out</button>
                </form>
            </div>
        </div>
        <div class="page-container">
            <div class="page-header">
                <h2>Backup Trend (Last 30 Days)</h2>
            </div>

            <div class="card">
                <div class="card-body">
                    <canvas id="backupTrendChart" height="100"></canvas>
                </div>
            </div>

            <div class="card mt-4">
                <div class="card-header">Daily Breakdown</div>
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Success</th>
                                <th>Failed</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${trendData}">
                                <td th:text="${item.date}"></td>
                                <td><span class="badge bg-success" th:text="${item.successCount}"></span></td>
                                <td><span class="badge bg-danger" th:text="${item.failedCount}"></span></td>
                                <td th:text="${item.totalCount}"></td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(trendData)}">
                                <td colspan="4" class="text-center text-muted py-4">No trend data available.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/webjars/chart.js/4.4.2/dist/chart.umd.js}"></script>
<script th:inline="javascript">
    Chart.defaults.color = '#8b8fa3';
    Chart.defaults.borderColor = 'rgba(255,255,255,0.06)';

    const trendData = [[${trendData}]];
    if (trendData && trendData.length > 0) {
        const labels = trendData.map(d => d.date);
        new Chart(document.getElementById('backupTrendChart'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Success', data: trendData.map(d => d.successCount), backgroundColor: '#198754' },
                    { label: 'Failed', data: trendData.map(d => d.failedCount), backgroundColor: '#dc3545' }
                ]
            },
            options: {
                responsive: true,
                scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true } },
                plugins: { legend: { position: 'top' } }
            }
        });
    }
</script>
</body>
</html>
