<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <title>Backup Jobs</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/infrawatch.css}">
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="flex-grow-1" style="margin-left: 250px; min-height: 100vh;">
        <div class="container-fluid p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Backup Jobs</h2>
            </div>

            <div class="card">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Name</th>
                                <th>Type</th>
                                <th>Source System</th>
                                <th>Target Location</th>
                                <th>Schedule</th>
                                <th>Retention (Days)</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="job : ${jobs}">
                                <td th:text="${job.name}"></td>
                                <td>
                                    <span class="badge bg-secondary" th:text="${job.type}"></span>
                                </td>
                                <td th:text="${job.sourceSystem}"></td>
                                <td th:text="${job.targetLocation}"></td>
                                <td th:text="${job.scheduleCron}"></td>
                                <td th:text="${job.retentionDays}"></td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${job.enabled ? 'bg-success' : 'bg-danger'}"
                                          th:text="${job.enabled ? 'Enabled' : 'Disabled'}"></span>
                                </td>
                            </tr>
                            <tr th:if="${jobs.isEmpty()}">
                                <td colspan="7" class="text-center text-muted py-4">No backup jobs found.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="card-footer" th:if="${jobs.totalPages > 1}">
                    <nav>
                        <ul class="pagination mb-0 justify-content-center">
                            <li class="page-item" th:classappend="${jobs.first ? 'disabled' : ''}">
                                <a class="page-link" th:href="@{/backup/jobs(page=${jobs.number - 1})}">Previous</a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, jobs.totalPages - 1)}"
                                th:classappend="${i == jobs.number ? 'active' : ''}">
                                <a class="page-link" th:href="@{/backup/jobs(page=${i})}" th:text="${i + 1}"></a>
                            </li>
                            <li class="page-item" th:classappend="${jobs.last ? 'disabled' : ''}">
                                <a class="page-link" th:href="@{/backup/jobs(page=${jobs.number + 1})}">Next</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
