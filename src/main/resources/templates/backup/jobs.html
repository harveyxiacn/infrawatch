<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Backup Jobs — InfraWatch</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/infrawatch.css}">
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <div class="top-bar">
            <span class="page-title">Backup Jobs</span>
            <div class="user-info">
                <span class="user-name" sec:authentication="name">user</span>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn-logout">Sign Out</button>
                </form>
            </div>
        </div>
        <div class="page-container">
            <div class="page-header">
                <h2>Backup Jobs</h2>
                <a th:href="@{/backup/jobs/new}" class="btn btn-primary">+ Add Job</a>
            </div>

            <div th:if="${message}" class="alert alert-info alert-dismissible fade show mb-3" role="alert" style="background: var(--status-info-soft); border: 1px solid rgba(59,130,246,0.2); color: var(--status-info);">
                <span th:text="${message}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Type</th>
                                <th>Source System</th>
                                <th>Target Location</th>
                                <th>Schedule</th>
                                <th>Retention (Days)</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="job : ${jobs}">
                                <td th:text="${job.name}"></td>
                                <td>
                                    <span class="badge bg-secondary" th:text="${job.type}"></span>
                                </td>
                                <td class="mono" th:text="${job.sourceSystem}"></td>
                                <td class="mono" th:text="${job.targetLocation}"></td>
                                <td class="mono" th:text="${job.scheduleCron}"></td>
                                <td th:text="${job.retentionDays}"></td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${job.enabled ? 'bg-success' : 'bg-danger'}"
                                          th:text="${job.enabled ? 'Enabled' : 'Disabled'}"></span>
                                </td>
                            </tr>
                            <tr th:if="${jobs.isEmpty()}">
                                <td colspan="7" class="text-center text-muted py-4">No backup jobs found.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="card-footer" th:if="${jobs.totalPages > 1}">
                    <nav>
                        <ul class="pagination mb-0 justify-content-center">
                            <li class="page-item" th:classappend="${jobs.first ? 'disabled' : ''}">
                                <a class="page-link" th:href="@{/backup/jobs(page=${jobs.number - 1})}">Previous</a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, jobs.totalPages - 1)}"
                                th:classappend="${i == jobs.number ? 'active' : ''}">
                                <a class="page-link" th:href="@{/backup/jobs(page=${i})}" th:text="${i + 1}"></a>
                            </li>
                            <li class="page-item" th:classappend="${jobs.last ? 'disabled' : ''}">
                                <a class="page-link" th:href="@{/backup/jobs(page=${jobs.number + 1})}">Next</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
