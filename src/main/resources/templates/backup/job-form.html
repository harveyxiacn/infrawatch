<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Add Backup Job — InfraWatch</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/infrawatch.css}">
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <div class="top-bar">
            <span class="page-title">Add Backup Job</span>
            <div class="user-info">
                <span class="user-name" sec:authentication="name">user</span>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn-logout">Sign Out</button>
                </form>
            </div>
        </div>
        <div class="page-container">
            <div class="page-header">
                <h2>Add Backup Job</h2>
            </div>
            <div class="card">
                <div class="card-body">
                    <form th:action="@{/backup/jobs/new}" method="post">
                        <div class="mb-3">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>
                        <div class="mb-3">
                            <label for="type" class="form-label">Type</label>
                            <select class="form-select" id="type" name="type" required>
                                <option value="FULL">FULL</option>
                                <option value="INCREMENTAL">INCREMENTAL</option>
                                <option value="DIFFERENTIAL">DIFFERENTIAL</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="sourceSystem" class="form-label">Source System</label>
                            <input type="text" class="form-control" id="sourceSystem" name="sourceSystem" required>
                        </div>
                        <div class="mb-3">
                            <label for="targetLocation" class="form-label">Target Location</label>
                            <input type="text" class="form-control" id="targetLocation" name="targetLocation" required>
                        </div>
                        <div class="mb-3">
                            <label for="scheduleCron" class="form-label">Schedule (Cron)</label>
                            <input type="text" class="form-control" id="scheduleCron" name="scheduleCron" placeholder="0 2 * * *">
                        </div>
                        <div class="mb-3">
                            <label for="retentionDays" class="form-label">Retention Days</label>
                            <input type="number" class="form-control" id="retentionDays" name="retentionDays" value="30">
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="enabled" name="enabled" checked>
                            <label class="form-check-label" for="enabled">Enabled</label>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Save</button>
                            <a th:href="@{/backup/jobs}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
