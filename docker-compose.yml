version: '3.8'
services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/infrawatch
      - SPRING_DATASOURCE_USERNAME=infrawatch
      - SPRING_DATASOURCE_PASSWORD=infrawatch123
      - JWT_SECRET=aW5mcmF3YXRjaC1wcm9kLXNlY3JldC1rZXktY2hhbmdlLXRoaXMtaW4tcHJvZHVjdGlvbg==
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=infrawatch
      - POSTGRES_USER=infrawatch
      - POSTGRES_PASSWORD=infrawatch123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infrawatch"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
